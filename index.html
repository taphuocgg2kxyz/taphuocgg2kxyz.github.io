<script>
  const cardWrapper = document.querySelector('.card-wrapper');
  const audio = document.getElementById('rickroll');
  
  if(cardWrapper && audio) {
    cardWrapper.addEventListener('click', () => {
      cardWrapper.classList.toggle('active');
      
      if (cardWrapper.classList.contains('active')) {
        audio.currentTime = 0; 
        audio.play().catch(e => console.log("Browser blocked autoplay"));
      } else {
        audio.pause();
        audio.currentTime = 0;
      }
    });
  }
</script>
